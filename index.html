<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qüestionari d'orientació — IES Sineu</title>
<style>
:root{
  --c1:#7C3AED;--c1l:#EDE9FE;--c1d:#4C1D95;
  --c4:#EC4899;--c4l:#FCE7F3;--c4d:#831843;
  --c3:#F59E0B;--c3l:#FEF3C7;--c3d:#78350F;
  --c5:#10B981;--c5l:#D1FAE5;--c5d:#064E3B;
  --c6:#EF4444;--c6l:#FEE2E2;--c6d:#7F1D1D;
  --bg:#F8F7FF;--surf:#fff;
  --text:#1a1a2e;--muted:#64748b;--light:#94a3b8;--bdr:#e2e8f0;
  --r:14px;--rl:20px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;}
.nav-bar{background:var(--surf);border-bottom:2px solid var(--bdr);padding:0 20px;display:flex;align-items:center;gap:12px;height:52px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:800;color:var(--text);}
.nav-spacer{flex:1;}
.nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--bdr);background:var(--surf);color:var(--muted);transition:all .15s;}
.nav-btn:hover{background:var(--bg);}
.nav-btn.active{background:var(--c1l);border-color:var(--c1);color:var(--c1);}
.intro-wrap{max-width:600px;margin:0 auto;padding:20px 16px 60px;}
.intro-hero{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--rl);padding:28px 24px 24px;margin-bottom:16px;text-align:center;}
.intro-hero h1{font-size:22px;font-weight:800;line-height:1.25;margin:16px 0 8px;}
.intro-hero p{font-size:14px;color:var(--muted);}
.intro-how{display:flex;align-items:center;gap:8px;background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:16px 18px;margin-bottom:14px;}
.ih-step{display:flex;align-items:center;gap:8px;flex:1;}
.ih-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;}
.ih-text{font-size:13px;color:var(--muted);line-height:1.3;}
.ih-text strong{color:var(--text);}
.ih-arrow{font-size:18px;color:var(--bdr);font-weight:700;flex-shrink:0;}
.card{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--rl);padding:22px;margin-bottom:14px;}
.name-wrap{position:relative;}
.name-wrap .ni{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;}
.name-input{width:100%;padding:13px 14px 13px 44px;border:2px solid var(--bdr);border-radius:var(--r);font-size:15px;font-family:inherit;background:var(--surf);color:var(--text);transition:border-color .15s;}
.name-input:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px var(--c1l);}
.intro-stats{display:flex;align-items:center;background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:14px 20px;margin-bottom:14px;}
.is-item{flex:1;text-align:center;}
.is-val{display:block;font-size:22px;font-weight:800;color:var(--c1);}
.is-lbl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px;}
.is-sep{width:2px;height:36px;background:var(--bdr);border-radius:1px;}
.btn-start{width:100%;padding:17px;background:var(--c1);color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s,transform .05s;}
.btn-start:hover{opacity:.88;}.btn-start:active{transform:scale(.99);}
.btn-ghost{width:100%;padding:13px;background:transparent;color:var(--muted);border:2px solid var(--bdr);border-radius:var(--r);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;transition:background .15s;}
.btn-ghost:hover{background:var(--bdr);}
.quiz-layout{display:flex;min-height:100vh;max-width:940px;margin:0 auto;}
.sidebar{width:220px;flex-shrink:0;padding:20px 14px;position:sticky;top:52px;height:calc(100vh - 52px);overflow-y:auto;border-right:2px solid var(--bdr);background:var(--surf);}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--bdr);}
.sb-logo-text{font-size:12px;font-weight:800;color:var(--text);line-height:1.2;}
.sb-section{margin-bottom:6px;}
.sb-head{display:flex;align-items:center;gap:7px;padding:7px 8px;cursor:pointer;border-radius:10px;transition:background .12s;}
.sb-head:hover{background:var(--bg);}
.sb-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sb-name{font-size:11.5px;font-weight:700;flex:1;line-height:1.25;}
.sb-pct{font-size:11px;font-weight:800;}
.sb-bar{height:3px;border-radius:2px;background:var(--bdr);margin:0 8px 4px;overflow:hidden;}
.sb-fill{height:100%;border-radius:2px;transition:width .4s;}
.quiz-main{flex:1;padding:20px 24px 80px;min-width:0;}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:12px 16px;}
.tb-pct{font-size:22px;font-weight:800;color:var(--c1);min-width:52px;}
.tb-track{flex:1;height:10px;background:var(--bdr);border-radius:5px;overflow:hidden;}
.tb-fill{height:100%;border-radius:5px;background:var(--c1);transition:width .35s cubic-bezier(.4,0,.2,1);}
.tb-label{font-size:12px;color:var(--muted);font-weight:700;min-width:80px;text-align:right;}
.sec-block{margin-bottom:8px;}
.sec-header{border-radius:var(--r);margin-bottom:10px;overflow:hidden;}
.sec-header-inner{display:flex;align-items:center;gap:14px;padding:16px 20px;color:#fff;font-weight:800;font-size:15px;}
.sh-count{font-size:12px;opacity:.8;margin-left:auto;font-weight:700;}
.q-card{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:16px 18px;margin-bottom:8px;}
.q-num{font-size:10px;font-weight:800;color:var(--light);letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;}
.q-text{font-size:14.5px;color:var(--text);margin-bottom:12px;line-height:1.45;}
.scale{display:flex;gap:5px;}
.sbtn{flex:1;padding:8px 3px;border:2px solid var(--bdr);border-radius:10px;background:var(--surf);cursor:pointer;font-family:inherit;font-size:12px;color:var(--text);transition:all .12s;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:48px;justify-content:center;}
.sbtn .sn{font-weight:800;font-size:17px;line-height:1;}
.sbtn .sl{font-size:10px;color:var(--muted);line-height:1.1;text-align:center;}
.sbtn.v0 .sn{color:#EF4444;}.sbtn.v1 .sn{color:#F97316;}.sbtn.v2 .sn{color:#EAB308;}.sbtn.v3 .sn{color:#84CC16;}.sbtn.v4 .sn{color:#10B981;}
.sbtn.v0:hover:not(.selected){background:#FEE2E2;border-color:#EF4444;}
.sbtn.v1:hover:not(.selected){background:#FFF7ED;border-color:#F97316;}
.sbtn.v2:hover:not(.selected){background:#FEFCE8;border-color:#EAB308;}
.sbtn.v3:hover:not(.selected){background:#F7FEE7;border-color:#84CC16;}
.sbtn.v4:hover:not(.selected){background:#D1FAE5;border-color:#10B981;}
.sbtn.selected .sn,.sbtn.selected .sl{color:#fff!important;}
.sbtn.v0.selected{background:#EF4444;border-color:#EF4444;}
.sbtn.v1.selected{background:#F97316;border-color:#F97316;}
.sbtn.v2.selected{background:#EAB308;border-color:#EAB308;}
.sbtn.v3.selected{background:#84CC16;border-color:#84CC16;}
.sbtn.v4.selected{background:#10B981;border-color:#10B981;}
.btn-submit{width:100%;padding:17px;background:var(--c1);color:#fff;border:none;border-radius:var(--r);font-size:17px;font-weight:800;font-family:inherit;cursor:pointer;transition:opacity .15s,transform .05s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:20px;}
.btn-submit:hover:not(:disabled){opacity:.88;}.btn-submit:active:not(:disabled){transform:scale(.99);}
.btn-submit:disabled{background:var(--bdr);color:var(--light);cursor:not-allowed;}
.btn-reset{width:100%;padding:13px;background:transparent;color:var(--muted);border:2px solid var(--bdr);border-radius:var(--r);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px;}
.btn-reset:hover{background:var(--bdr);}
.loading-wrap{max-width:460px;margin:0 auto;padding:60px 24px;text-align:center;}
.load-title{font-size:20px;font-weight:800;margin:24px 0 6px;}
.load-sub{font-size:14px;color:var(--muted);}
.load-bar{height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;margin:24px 0;}
.load-fill{height:100%;background:var(--c1);border-radius:4px;animation:lp 2.5s ease-in-out forwards;}
@keyframes lp{from{width:0}to{width:92%}}
.load-dots span{display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 3px;animation:bounce 1.2s infinite;}
.load-dots span:nth-child(1){background:var(--c1);}.load-dots span:nth-child(2){background:var(--c4);animation-delay:.2s;}.load-dots span:nth-child(3){background:var(--c3);animation-delay:.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.results-wrap{max-width:720px;margin:0 auto;padding:0 16px 80px;}
.res-hero{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--rl);padding:28px 24px;margin-bottom:20px;text-align:center;}
.res-hero h2{font-size:22px;font-weight:800;margin:16px 0 4px;}
.res-hero .meta{font-size:13px;color:var(--muted);}
.sum-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.sum-card{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:14px 12px;text-align:center;}
.sum-card .scv{font-size:22px;font-weight:800;color:var(--c1);}
.sum-card .scl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;}
.sec-title{font-size:17px;font-weight:800;margin:28px 0 6px;}
.sec-desc{font-size:13px;color:var(--muted);margin-bottom:14px;}
.top-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px;}
.top-card{border-radius:var(--rl);padding:18px 16px;border:2px solid var(--bdr);background:var(--surf);}
.top-card.tc-1{border-color:var(--c1);background:var(--c1l);}
.top-card.tc-2{border-color:var(--c4);background:var(--c4l);}
.top-card.tc-3{border-color:var(--c3);background:var(--c3l);}
.tc-medal{font-size:28px;margin-bottom:6px;}
.tc-rank{font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px;opacity:.7;}
.tc-name{font-size:13px;font-weight:800;line-height:1.3;margin-bottom:8px;}
.tc-pct{font-size:26px;font-weight:800;line-height:1;}
.tc-1 .tc-rank,.tc-1 .tc-name,.tc-1 .tc-pct{color:var(--c1d);}
.tc-2 .tc-rank,.tc-2 .tc-name,.tc-2 .tc-pct{color:var(--c4d);}
.tc-3 .tc-rank,.tc-3 .tc-name,.tc-3 .tc-pct{color:var(--c3d);}
.tc-z{font-size:11px;color:var(--muted);margin-top:2px;}
.interp-box{background:var(--c1l);border-radius:var(--rl);padding:22px 24px;margin:20px 0;border-left:4px solid var(--c1);border-top-left-radius:0;border-bottom-left-radius:0;}
.ib-head{font-size:14px;font-weight:800;color:var(--c1d);margin-bottom:10px;}
.ib-body{font-size:14px;line-height:1.75;color:var(--c1d);white-space:pre-wrap;}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-lbl{width:185px;font-size:12px;color:var(--text);flex-shrink:0;line-height:1.2;font-weight:600;}
.bar-track{flex:1;height:18px;background:var(--bg);border-radius:6px;overflow:hidden;border:2px solid var(--bdr);}
.bar-fill{height:100%;border-radius:5px;transition:width .9s cubic-bezier(.4,0,.2,1);}
.bar-val{width:40px;text-align:right;font-size:12px;font-weight:700;color:var(--muted);}
.leg-row{display:flex;gap:10px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-bottom:12px;}
.li{display:flex;align-items:center;gap:4px;}
.ld{width:10px;height:10px;border-radius:3px;}
.careers-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:24px;}
.career-card{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:14px 16px;transition:border-color .15s;cursor:pointer;}
.career-card:hover{border-color:var(--c1);}
.career-card.open{border-color:var(--c1);background:var(--c1l);}
.cc-header{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;}
.cc-icon{font-size:22px;flex-shrink:0;}
.cc-name{font-size:13.5px;font-weight:800;line-height:1.3;color:var(--text);}
.ct{display:inline-block;font-size:10px;background:var(--c1l);color:var(--c1d);padding:2px 8px;border-radius:5px;font-weight:700;margin:2px 2px 0 0;}
.career-card.open .ct{background:rgba(255,255,255,.7);}
.cc-desc-panel{margin-top:10px;border-top:1.5px solid var(--bdr);padding-top:10px;display:none;}
.career-card.open .cc-desc-panel{display:block;}
.cc-desc-text{font-size:13px;color:var(--muted);line-height:1.55;margin-bottom:8px;}
.career-card.open .cc-desc-text{color:var(--c1d);}
.cc-profs-title{font-size:10px;font-weight:800;color:var(--light);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px;}
.career-card.open .cc-profs-title{color:var(--c1d);opacity:.7;}
.cc-profs{display:flex;flex-wrap:wrap;gap:4px;}
.cc-prof{font-size:11px;background:rgba(255,255,255,.8);color:var(--c1d);border:1.5px solid rgba(124,58,237,.25);padding:2px 8px;border-radius:20px;font-weight:600;}
.assig-sec{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:18px 20px;margin-bottom:24px;}
.ar{display:flex;align-items:center;gap:10px;font-size:13px;margin-bottom:7px;}
.al{flex:1;font-weight:600;}
.ab{flex:0 0 90px;height:8px;background:var(--bdr);border-radius:4px;overflow:hidden;}
.af{height:100%;background:var(--c1);transition:width .7s;}
.av{width:36px;text-align:right;font-size:12px;color:var(--muted);font-weight:700;}
.act-row{display:flex;gap:10px;margin-top:20px;}
.act-row .btn-start,.act-row .btn-ghost{margin:0;}
.btn-start.sm{padding:14px;font-size:15px;}
.pp-section{margin-bottom:8px;}
.pp-consell{background:var(--c3l);border-left:4px solid var(--c3);border-radius:0 var(--rl) var(--rl) 0;padding:18px 20px;margin-bottom:24px;}
.pp-consell-head{font-size:13px;font-weight:800;color:var(--c3d);margin-bottom:8px;}
.pp-consell-body{font-size:14px;line-height:1.65;color:var(--c3d);}
.pp-block-title{font-size:14px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 10px;}
.pp-recursos-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:12px;}
.pp-recurs{border-radius:16px;padding:16px 14px;text-decoration:none;color:inherit;display:block;transition:transform .12s,opacity .12s;}
.pp-recurs:hover{transform:translateY(-2px);opacity:.9;}
.pp-recurs-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:10px;}
.pp-contacte{display:flex;align-items:center;gap:14px;background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:16px 18px;margin-top:12px;}
.pp-contacte-icon{font-size:26px;flex-shrink:0;}
.pp-contacte-text{font-size:13px;color:var(--muted);margin-bottom:3px;}
.pp-contacte-email{font-size:14px;font-weight:800;color:var(--c1);text-decoration:none;}
.pp-contacte-email:hover{text-decoration:underline;}
.orient-wrap{max-width:860px;margin:0 auto;padding:24px 16px 60px;}
.orient-hero{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--rl);padding:24px;margin-bottom:20px;}
.orient-hero h2{font-size:20px;font-weight:800;margin-bottom:4px;}
.orient-hero p{font-size:13.5px;color:var(--muted);}
.orient-stat{display:inline-block;background:var(--c1l);border-radius:10px;padding:8px 14px;margin-top:12px;text-align:center;}
.orient-stat .ov{font-size:20px;font-weight:800;color:var(--c1);}
.orient-stat .ol{font-size:11px;color:var(--c1d);font-weight:700;}
.orient-empty{text-align:center;padding:60px 20px;color:var(--muted);}
.orient-empty p{font-size:15px;font-weight:600;}
.alumnes-list{display:flex;flex-direction:column;gap:8px;}
.alumne-row{background:var(--surf);border:2px solid var(--bdr);border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .15s;}
.alumne-row:hover{border-color:var(--c1);}
.alumne-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0;}
.alumne-info{flex:1;min-width:0;}
.alumne-nom{font-size:14px;font-weight:800;}
.alumne-data{font-size:12px;color:var(--muted);margin-top:1px;}
.alumne-top{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;}
.alumne-tag{font-size:11px;font-weight:700;padding:2px 10px;border-radius:20px;}
.alumne-pct{font-size:22px;font-weight:800;color:var(--c1);min-width:52px;text-align:right;}
.alumne-chevron{color:var(--light);font-size:18px;}
.orient-btn-del{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;border:2px solid var(--c6l);background:var(--c6l);color:var(--c6);transition:all .15s;flex-shrink:0;}
.orient-btn-del:hover{background:var(--c6);color:#fff;border-color:var(--c6);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto;padding:20px;}
.modal-box{background:var(--surf);border-radius:var(--rl);width:100%;max-width:700px;padding:28px;position:relative;margin:40px auto;}
.modal-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;border:2px solid var(--bdr);background:var(--surf);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit;color:var(--muted);}
.modal-close:hover{background:var(--bg);}
.pwd-input{width:100%;padding:12px 14px;border:2px solid var(--bdr);border-radius:var(--r);font-size:15px;font-family:inherit;margin-bottom:8px;transition:border-color .15s;}
.pwd-input:focus{outline:none;border-color:var(--c1);}
@media(max-width:640px){.quiz-layout{flex-direction:column;}.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:2px solid var(--bdr);padding:12px 16px;top:0;}.quiz-main{padding:16px 12px 80px;}.bar-lbl{width:110px;font-size:11px;}}
@media print{.nav-bar,.sidebar,.top-bar,.btn-submit,.btn-reset,.btn-start,.btn-ghost,.act-row{display:none!important;}body{background:white;}}
</style>
</head>
<body>

function calc(){
  var tot=new Array(AMB.length).fill(0),mx=new Array(AMB.length).fill(0);
  for(var i=0;i<Q.length;i++){var v=state.ans[i]||0;ATR[i].forEach(function(a){tot[a]+=v;mx[a]+=4;});}
  for(var i=0;i<ASS.length;i++){var v=state.ansA[i]||0;ATRA[i].forEach(function(a){tot[a]+=v;mx[a]+=4;});}
  var pcts=tot.map(function(t,i){return mx[i]>0?(t/mx[i])*100:0;});
  var mean=pcts.reduce(function(a,b){return a+b;},0)/pcts.length;
  var std=Math.sqrt(pcts.reduce(function(ac,v){return ac+Math.pow(v-mean,2);},0)/pcts.length);
  var zs=pcts.map(function(p){return std>0?(p-mean)/std:0;});
  var ar=AMB.map(function(name,i){return{name:name,p:pcts[i],z:zs[i]};});
  return{ar:ar,mean:mean,std:std,sorted:ar.slice().sort(function(a,b){return b.p-a.p;})};
}

function interp(r){
  var s=r.sorted,t1=s[0],t2=s[1],t3=s[2],b1=s[s.length-1],b2=s[s.length-2];
  var d1=DESC[t1.name],d2=DESC[t2.name],db1=DESC[b1.name],db2=DESC[b2.name];
  var paras=[];
  var k1=d1.pt+"+"+d2.pt,k2=d2.pt+"+"+d1.pt;
  paras.push(PNARR[k1]||PNARR[k2]||("El teu perfil està liderat per "+t1.name.toLowerCase()+" i "+t2.name.toLowerCase()+". "+d1.str.charAt(0).toUpperCase()+d1.str.slice(1)+", i a més "+d2.str+"."));
  var sp=t1.p>=75?("El teu àmbit més fort és "+t1.name.toLowerCase()+" ("+t1.p.toFixed(0)+"%)."):t1.p>=60?("El teu àmbit més afí és "+t1.name.toLowerCase()+" ("+t1.p.toFixed(0)+"%)."):("El que més s'acosta és "+t1.name.toLowerCase()+" ("+t1.p.toFixed(0)+"%).");
  if(t3.z>0.3)sp+=" En tercer lloc apareix "+t3.name.toLowerCase()+".";
  paras.push(sp);
  var vl=s.filter(function(a){return a.z<-1;});
  if(vl.length>=2)paras.push("Els àmbits més lluny dels teus interessos són "+b1.name.toLowerCase()+" i "+b2.name.toLowerCase()+". "+db1.wk.charAt(0).toUpperCase()+db1.wk.slice(1)+".");
  else if(vl.length===1)paras.push("On menys et trobes és en "+b1.name.toLowerCase()+": "+db1.wk+".");
  else paras.push("El teu perfil és bastant equilibrat. El que menys t'atreu és "+b1.name.toLowerCase()+".");
  var high=[];
  var am=[["les matèries lingüístiques",0],["les matemàtiques",1],["les llengües estrangeres",2],["les humanitats",3],["les matèries científiques",4],["les matèries tecnològiques",5],["les matèries artístiques",6],["les ciències socials",7]];
  am.forEach(function(x){if((state.ansA[x[1]]||0)>=3)high.push(x[0]);});
  if(high.length)paras.push(high.length===1?"Destaques clarament "+high[0]+".":high.length===2?"Preferència per "+high[0]+" i "+high[1]+".":"Afinitats amb "+high.slice(0,-1).join(", ")+" i "+high[high.length-1]+".");
  var ab=s.filter(function(a){return a.z>0.3;}).length;
  if(ab>=4)paras.push("En conjunt, tens un perfil ric — "+ab+" àmbits per sobre de la teva mitjana.");
  else if(ab>=2)paras.push("Perfil amb direcció marcada. Aprofita-ho per investigar les vies que connecten amb els teus punts forts.");
  else paras.push("El teu perfil té una orientació identificable. Parla amb el teu orientador/a per explorar opcions concretes.");
  return paras.join("\n\n");
}

function getCareers(r){
  var top3=r.sorted.slice(0,3),mp={};
  top3.forEach(function(a,i){
    var pt=DESC[a.name].pt,cars=CDB[pt]||[];
    cars.forEach(function(c){if(!mp[c.n])mp[c.n]={n:c.n,t:c.t,ic:c.ic,d:c.d,pr:c.pr,sc:0};mp[c.n].sc+=i===0?3:i===1?2:1;});
  });
  return Object.values(mp).sort(function(a,b){return b.sc-a.sc;}).slice(0,8);
}

function render(){
  var root=document.getElementById("app-root");
  var nav='<nav class="nav-bar"><div class="nav-logo">'+SV_NAV+' Orientació</div><div class="nav-spacer"></div>'
    +'<button class="nav-btn'+(view==="alumne"?" active":"")+'" onclick="sw(\'alumne\')">Alumne</button>'
    +'<button class="nav-btn'+(view==="orientador"?" active":"")+'" onclick="sw(\'orientador\')">Orientador</button></nav>';
  if(view==="orientador"){
    root.innerHTML=nav+'<div style="text-align:center;padding:40px;color:var(--muted);font-weight:700;">Carregant...</div>';
    doOrientador(root,nav);return;
  }
  var vc=document.createElement("div");vc.id="vc";
  root.innerHTML=nav;root.appendChild(vc);
  if(state.step==="intro")doIntro(vc);
  else if(state.step==="quiz")doQuiz(vc);
  else if(state.step==="loading")doLoad(vc);
  else if(state.step==="results")doResults(vc);
}

function sw(v){
  if(v==="orientador"&&!auth){showPwd();return;}
  view=v;render();window.scrollTo(0,0);
}

function setA(kind,idx,val){
  if(kind==="q")state.ans[idx]=val;else state.ansA[idx]=val;
  sv();
  var sec=SECS.find(function(s){return s.isA?kind==="a":kind==="q"&&idx>=s.s&&idx<s.e;});
  var card=document.getElementById("qc"+kind+idx);
  if(card&&sec){card.style.borderColor=sec.c+"33";card.style.background=sec.b+"55";card.querySelector(".q-num").style.color=sec.c+"99";card.querySelectorAll(".sbtn").forEach(function(b,i){b.classList.toggle("selected",i===val);});}
  var tot=Q.length+ASS.length;
  var ans=state.ans.filter(function(a){return a!==null;}).length+state.ansA.filter(function(a){return a!==null;}).length;
  var pct=Math.round((ans/tot)*100);
  var tf=document.getElementById("tbf");if(tf)tf.style.width=pct+"%";
  var tp=document.getElementById("tbp");if(tp)tp.textContent=pct+"%";
  var tl=document.getElementById("tbl");if(tl)tl.textContent=ans+"/"+tot+" respostes";
  SECS.forEach(function(s,si){
    var a=sAns(s),t=sTot(s),p=Math.round((a/t)*100);
    var f=document.getElementById("sbf"+si);if(f)f.style.width=p+"%";
    var shc=document.getElementById("shc"+si);if(shc)shc.textContent=a+"/"+t;
    var heads=document.querySelectorAll(".sb-head");
    if(heads[si]){var nm=heads[si].querySelector(".sb-name");if(nm)nm.style.color=a===t?s.c:"";}
    var pEl=document.querySelectorAll(".sb-pct")[si];if(pEl)pEl.textContent=p+"%";
  });
  var btn=document.getElementById("sub");
  if(btn){if(ans===tot){btn.disabled=false;btn.innerHTML="Veure el meu perfil &#8594;";}else{btn.disabled=true;btn.textContent="Falten "+(tot-ans)+" preguntes";}}
}

async function doSubmit(){
  state.step="loading";render();

  var si=0;var iv=setInterval(function(){si++;if(si<st.length){var te=document.getElementById("lt"),se=document.getElementById("ls");if(te)te.textContent=st[si].t;if(se)se.textContent=st[si].s;}},800);
  state.res=calc();state.interp=interp(state.res);state.careers=getCareers(state.res);
  await new Promise(function(r){setTimeout(r,2400);});clearInterval(iv);
  var r2=state.res;

function exportPDF(){
  var r=state.res,sorted=r.sorted,top5=sorted.slice(0,5);
  var nom=state.nom||"Perfil";
  var today=new Date().toLocaleDateString("ca-ES",{day:"numeric",month:"long",year:"numeric"});
  var W=595,H=842; // A4 en punts aproximats
  var cv=document.createElement("canvas");
  cv.width=W*2;cv.height=H*2;
  var ctx=cv.getContext("2d");ctx.scale(2,2);
  var COLS=["#7C3AED","#EC4899","#0EA5E9","#10B981","#F59E0B","#F97316","#EF4444","#84CC16","#6366F1","#EF4444","#10B981","#3B82F6","#EF4444"];

  // Fons blanc
  ctx.fillStyle="#ffffff";ctx.fillRect(0,0,W,H);

  // Capçalera morada
  ctx.fillStyle="#7C3AED";rrx(ctx,0,0,W,70,0);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="bold 10px system-ui,sans-serif";ctx.fillText("IES SINEU — QÜESTIONARI D'ORIENTACIÓ ACADÈMICA I PROFESSIONAL",24,22);
  ctx.font="bold 18px system-ui,sans-serif";ctx.fillText(nom,24,46);
  ctx.font="10px system-ui,sans-serif";ctx.fillStyle="rgba(255,255,255,0.75)";ctx.fillText(today,24,62);

  // Top 3 targetes
  var tcW=(W-48-16)/3;
  var tcBg=["#EDE9FE","#FCE7F3","#FEF3C7"],tcC=["#7C3AED","#EC4899","#F59E0B"],tcD=["#4C1D95","#831843","#78350F"];
  sorted.slice(0,3).forEach(function(a,i){
    var x=24+i*(tcW+8),y=84;
    ctx.fillStyle=tcBg[i];rrx(ctx,x,y,tcW,80,8);ctx.fill();
    ctx.strokeStyle=tcC[i];ctx.lineWidth=1.5;rrx(ctx,x,y,tcW,80,8);ctx.stroke();
    ctx.font="15px sans-serif";ctx.fillStyle="#000";ctx.fillText(["🥇","🥈","🥉"][i],x+10,y+22);
    ctx.fillStyle=tcD[i];ctx.font="bold 8px system-ui,sans-serif";ctx.fillText(["1r LLOC","2n LLOC","3r LLOC"][i],x+32,y+18);
    ctx.font="bold 10px system-ui,sans-serif";
    var wds=a.name.split(" ");var ln="",ly=y+32;
    wds.forEach(function(w){var t=ln+(ln?" ":"")+w;if(ctx.measureText(t).width>tcW-20&&ln){ctx.fillText(ln,x+10,ly);ln=w;ly+=13;}else ln=t;});
    ctx.fillText(ln,x+10,ly);
    ctx.fillStyle=tcC[i];ctx.font="bold 18px system-ui,sans-serif";ctx.fillText(a.p.toFixed(0)+"%",x+10,y+72);
  });

  // Interpretació
  var iy=178;
  ctx.fillStyle="#EDE9FE";rrx(ctx,24,iy,W-48,8,6);ctx.fill(); // placeholder bar
  ctx.fillStyle="#4C1D95";ctx.font="bold 10px system-ui,sans-serif";ctx.fillText("✦ Interpretació del perfil",24,iy-6);
  ctx.fillStyle="#EDE9FE";rrx(ctx,24,iy,W-48,100,6);ctx.fill();
  ctx.strokeStyle="#7C3AED";ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(24,iy);ctx.lineTo(24,iy+100);ctx.stroke();
  ctx.fillStyle="#4C1D95";ctx.font="10px system-ui,sans-serif";
  var interpLines=state.interp.split("\n\n").join(" ").split(" ");
  var line2="",lly=iy+14,maxW=W-60;
  interpLines.forEach(function(w){
    var t=line2+(line2?" ":"")+w;
    if(ctx.measureText(t).width>maxW&&line2){ctx.fillText(line2,32,lly);line2=w;lly+=13;if(lly>iy+96)return;}
    else line2=t;
  });
  if(lly<=iy+96)ctx.fillText(line2,32,lly);

  // Barres de tots els àmbits
  var bsy=296;
  ctx.fillStyle="#1a1a2e";ctx.font="bold 10px system-ui,sans-serif";ctx.fillText("Puntuació detallada per àmbit",24,bsy-8);
  sorted.forEach(function(a,i){
    var y=bsy+i*22,lW=160,bx=24+lW+6,mW=W-bx-50;
    ctx.fillStyle="#1a1a2e";ctx.font="9.5px system-ui,sans-serif";
    ctx.fillText(a.name.length>24?a.name.slice(0,22)+"...":a.name,24,y+12);
    ctx.fillStyle="#f1f0f8";rrx(ctx,bx,y+2,mW,13,4);ctx.fill();
    var col=COLS[AMB.indexOf(a.name)]||"#7C3AED";
    ctx.fillStyle=col;var fw=(a.p/100)*mW;rrx(ctx,bx,y+2,Math.max(fw,4),13,4);ctx.fill();
    ctx.fillStyle="#64748b";ctx.font="bold 9px system-ui,sans-serif";ctx.fillText(a.p.toFixed(0)+"%",bx+mW+4,y+13);
  });

  // Assignatures
  var asy=bsy+AMB.length*22+12;
  ctx.fillStyle="#1a1a2e";ctx.font="bold 10px system-ui,sans-serif";ctx.fillText("Interès en assignatures",24,asy);
  var aW=(W-48)/ASS.length-3;
  ASS.forEach(function(nm,i){
    var x=24+i*(aW+3),mH=40,bH=(state.ansA[i]||0)/4*mH,by=asy+10+(mH-bH);
    ctx.fillStyle="#f1f0f8";rrx(ctx,x,asy+10,aW,mH,3);ctx.fill();
    ctx.fillStyle="#7C3AED";ctx.globalAlpha=0.3+((state.ansA[i]||0)/4)*0.7;rrx(ctx,x,by,aW,bH,3);ctx.fill();ctx.globalAlpha=1;
    ctx.fillStyle="#64748b";ctx.font="7.5px system-ui,sans-serif";ctx.textAlign="center";
    ctx.fillText(nm.split("(")[0].trim().split(" ").slice(0,2).join(" "),x+aW/2,asy+10+mH+10);ctx.textAlign="left";
  });

  // Peu
  ctx.fillStyle="#e2e8f0";ctx.fillRect(0,H-24,W,24);
  ctx.fillStyle="#94a3b8";ctx.font="9px system-ui,sans-serif";ctx.fillText("Qüestionari d'Orientació Acadèmica i Professional — IES Sineu",24,H-9);

  cv.toBlob(function(blob){
    var url=URL.createObjectURL(blob);
    var lk=document.createElement("a");
    lk.download="perfil-orientacio-"+(state.nom||"alumne").replace(/\s+/g,"-").toLowerCase()+".png";
    lk.href=url;document.body.appendChild(lk);lk.click();document.body.removeChild(lk);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
    showFb("✓ PDF desat com a imatge!");
  },"image/png");
}

function rrx(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
